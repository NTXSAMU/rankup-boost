name: Deploy to GitHub Pages

# Se ejecuta automáticamente cada vez que subes cambios a "main",
# o manualmente desde la pestaña "Actions" del repositorio.
on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Permisos mínimos necesarios para publicar en GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Evita despliegues simultáneos que se pisen entre sí
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Subir el sitio como artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          # Como es un sitio estático sin build, se sube la raíz del repo tal cual
          path: '.'

      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
